<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Worker Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">
  <div class="container text-center">
    <h1 class="mb-4">Daily Attendance</h1>

    <div class="alert alert-info" id="welcome"></div>

    <div class="card p-4 shadow mx-auto" style="max-width: 500px;">
      <h3>Mark Your Attendance</h3>
      <p id="status" class="mt-3 fw-bold"></p>

      <button id="checkInBtn" class="btn btn-success btn-lg mt-3">Check In</button>
      <button id="checkOutBtn" class="btn btn-warning btn-lg mt-3 ms-2">Check Out</button>
    </div>
  <h1>after</h1>
  
    <button id="logoutBtn" class="btn btn-danger btn-lg mt-5" onclick="setupLogout()">Logout</button>
  </div>

  <script src="../public/admin/auth.js"></script>
  <script>
    // Simple attendance marking
    document.getElementById("checkInBtn").addEventListener("click", async () => {
      const res = await fetch("/mark-attendance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "check-in" }),
        credentials: "include"
      });
      const data = await res.json();
      document.getElementById("status").textContent = data.message;
      document.getElementById("status").style.color = "green";
    });

    document.getElementById("checkOutBtn").addEventListener("click", async () => {
      const res = await fetch("/mark-attendance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "check-out" }),
        credentials: "include"
      });
      const data = await res.json();
      document.getElementById("status").textContent = data.message;
      document.getElementById("status").style.color = "blue";
    });
  </script>
</body>
</html>
